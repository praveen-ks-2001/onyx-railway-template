# Onyx reverse proxy — single public entrypoint.
#
# Routes:
#   /api/*  /scim/*  /openapi.json  -> api-server:8080
#   everything else                  -> web-server:3000
#
# The `resolver` + variable-in-proxy_pass pattern forces nginx to re-resolve
# the upstream hostname on every request, so Railway redeploys of api-server
# or web-server don't cause stale-DNS 502s.

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 1024m;
    client_body_timeout 300s;
    client_header_timeout 60s;

    # Railway's internal DNS. Short TTL so nginx picks up service IP changes.
    resolver 1.1.1.1 1.0.0.1 valid=10s ipv6=off;
    resolver_timeout 5s;

    set $backend_api "api-server.railway.internal:8080";
    set $backend_web "web-server.railway.internal:3000";

    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    send_timeout          300s;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    location = /nginx-healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://$backend_api;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /scim/ {
        proxy_pass http://$backend_api;
    }

    location /openapi.json {
        proxy_pass http://$backend_api;
    }

    location / {
        proxy_pass http://$backend_web;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
